name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install system dependencies for R packages
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Build renv lockfile with correct CRAN mirror
        run: |
          Rscript -e "
            app_dir <- normalizePath('shiny_apps/gwat_portfolio')
            options(repos = c(CRAN = 'https://cloud.r-project.org'))
            install.packages('renv', repos = 'https://cloud.r-project.org')
            writeLines(c(
              'Package: gwatrnaseq',
              'Title: gWAT RNA-seq Explorer',
              'Version: 1.0.0',
              'Imports: shiny, plotly, dplyr, stringr'
            ), file.path(app_dir, 'DESCRIPTION'))
            renv::init(project = app_dir, bare = TRUE, restart = FALSE)
            renv::install(c('shiny', 'plotly', 'dplyr', 'stringr'), prompt = FALSE)
            renv::snapshot(project = app_dir, type = 'explicit', prompt = FALSE)
          "

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e "
            options(repos = c(CRAN = 'https://cloud.r-project.org'))
            install.packages('rsconnect', repos = 'https://cloud.r-project.org')
            rsconnect::setAccountInfo(
              name   = Sys.getenv('SHINYAPPS_NAME'),
              token  = Sys.getenv('SHINYAPPS_TOKEN'),
              secret = Sys.getenv('SHINYAPPS_SECRET')
            )
            rsconnect::deployApp(
              appDir      = 'shiny_apps/gwat_portfolio',
              appName     = 'gwat_rnaseq',
              forceUpdate = TRUE,
              launch.browser = FALSE
            )
          "

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ai_studio
        run: npm install

      - name: Stage public assets
        run: |
          mkdir -p ai_studio/public/assets/images
          cp assets/images/headshot.jpg ai_studio/public/assets/images/headshot.jpg
          cp Dearborn_CV_March_2026.pdf ai_studio/public/Dearborn_CV_March_2026.pdf

      - name: Build
        working-directory: ai_studio
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ai_studio/dist
